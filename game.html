<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cage Fight - MMA Fighter</title>
  <style>
    body { margin:0; background:#0d0d0f; color:#fff;
      font-family:'Arial Black', Arial, sans-serif; text-align:center; padding:20px 10px 40px; }
    h1 { letter-spacing:3px; color:#e74c3c; text-shadow:0 0 12px rgba(231,76,60,.7); margin:10px 0; }
    .bars { width:760px; max-width:100%; margin:0 auto 6px; display:flex; gap:20px; }
    .bar-wrap { flex:1; }
    .bar-label { text-align:left; font-size:14px; margin-bottom:4px; }
    .bar-label.right { text-align:right; }
    .bar-bg { background:#333; border:2px solid #000; height:24px; border-radius:4px; overflow:hidden; }
    .bar-fill { height:100%; width:100%; transition:width .12s linear; }
    .p1 { background:linear-gradient(180deg,#5dade2,#2e86c1); }
    .p2 { background:linear-gradient(180deg,#ec7063,#c0392b); margin-left:auto; }
    #meter { width:760px; max-width:100%; margin:0 auto 8px; font-family:Arial,sans-serif;
      font-size:13px; color:#9fc4dd; display:flex; justify-content:space-between; }
    #meter b { color:#f1c40f; }
    .stage { position:relative; width:760px; max-width:100%; margin:0 auto; }
    canvas { background:#11141a; border:4px solid #444; border-radius:8px; width:100%; height:auto; display:block; }
    #menu { position:absolute; inset:0; background:rgba(5,7,10,.88); border-radius:8px;
      display:flex; flex-direction:column; align-items:center; justify-content:center; }
    #menu h2 { color:#fff; margin:0 0 6px; }
    #menu p { color:#bbb; font-family:Arial,sans-serif; margin:0 0 18px; }
    .diff { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
    .diff button { font-size:18px; padding:12px 22px; }
    #menu.hidden { display:none; }
    #controls { margin-top:16px; color:#bbb; font-size:14px; font-family:Arial,sans-serif; }
    #controls b { color:#fff; }
    button { font-size:18px; padding:10px 24px; background:#c0392b; color:#fff; border:none;
      border-radius:6px; cursor:pointer; font-family:'Arial Black',sans-serif; margin:6px; }
    button:hover { background:#e74c3c; }
    a { color:#5dade2; font-family:Arial,sans-serif; }
  </style>
</head>
<body>

  <h1>CAGE FIGHT</h1>

  <div class="bars">
    <div class="bar-wrap"><div class="bar-label">YOU</div>
      <div class="bar-bg"><div class="bar-fill p1" id="hp1"></div></div></div>
    <div class="bar-wrap"><div class="bar-label right">CPU</div>
      <div class="bar-bg"><div class="bar-fill p2" id="hp2"></div></div></div>
  </div>

  <div id="meter">
    <span>Punch combo: <b id="pc">0</b>/5 &nbsp; Kick combo: <b id="kc">0</b>/5</span>
    <span id="diffLabel"></span>
  </div>

  <div class="stage">
    <canvas id="game" width="760" height="360"></canvas>
    <div id="menu">
      <h2>CHOOSE DIFFICULTY</h2>
      <p>1 = easy, 3 = brutal. Grab power-ups. 5 punches or kicks in a row = SUPER.</p>
      <div class="diff">
        <button onclick="startGame(1)">1 &middot; Easy</button>
        <button onclick="startGame(2)">2 &middot; Medium</button>
        <button onclick="startGame(3)">3 &middot; Brutal</button>
      </div>
    </div>
  </div>

  <div id="controls">
    <b>A</b>/<b>D</b> move &nbsp;|&nbsp; <b>SPACE</b> jump &nbsp;|&nbsp;
    <b>J</b> punch &nbsp;|&nbsp; <b>K</b> kick &nbsp;|&nbsp; hold <b>L</b> block
  </div>
  <div><button onclick="openMenu()">Rematch / Change Difficulty</button></div>
  <p><a href="scratch.html">&larr; Back to MMA page</a></p>

  <script>
    const cv = document.getElementById("game");
    const ctx = cv.getContext("2d");
    const W = 760, H = 360, GROUND = 320;
    const GRAV = 0.8, JUMP = -14, BASESPEED = 3.6, FW = 60;
    const hp1el = document.getElementById("hp1"), hp2el = document.getElementById("hp2");
    const pcEl = document.getElementById("pc"), kcEl = document.getElementById("kc");
    const menu = document.getElementById("menu"), diffLabel = document.getElementById("diffLabel");

    // CPU settings per difficulty
    const DIFF = {
      1: { think:[28,48], atk:0.25, blk:0.12, spd:2.6, gap:175, dmg:0.8,  react:0.0, grab:0.2 },
      2: { think:[16,30], atk:0.45, blk:0.24, spd:3.5, gap:150, dmg:1.0,  react:0.3, grab:0.5 },
      3: { think:[6,13],  atk:0.66, blk:0.42, spd:4.6, gap:120, dmg:1.18, react:0.7, grab:0.85 }
    };

    let p1, p2, phase, difficulty, powerups = [], spawnT, effects = [], banner, bannerColor;
    let keys = {};

    function makeFighter(x, facing, isCPU, color, glove, band, shorts) {
      return { x, y:GROUND, vy:0, onGround:true, hp:100, facing,
        state:"idle", stateT:0, cd:0, isCPU, color, glove, band, shorts,
        think:0, punchStreak:0, kickStreak:0, flash:0,
        dmgBuff:0, shield:0, speedBuff:0, superFx:0 };
    }

    function startGame(level) {
      difficulty = level;
      p1 = makeFighter(180, 1, false, "#5dade2", "#2e86c1", "#1b4f72", "#1b4f72");
      p2 = makeFighter(540, -1, true, "#ec7063", "#c0392b", "#7b241c", "#7b241c");
      keys = {}; powerups = []; effects = []; spawnT = 240;
      banner = "FIGHT!"; bannerColor = "#f1c40f";
      phase = "intro";
      menu.classList.add("hidden");
      diffLabel.textContent = "Difficulty: " + (level===1?"Easy":level===2?"Medium":"Brutal");
      setTimeout(() => { if (phase === "intro") { phase = "fight"; banner = ""; } }, 900);
    }
    function openMenu() { phase = "menu"; banner = ""; menu.classList.remove("hidden"); }

    document.addEventListener("keydown", e => {
      const k = e.key.toLowerCase();
      if (["a","d","j","k","l"," "].includes(k)) e.preventDefault();
      if (!keys[k] && phase === "fight") {
        if (k === " ") jump(p1);
        if (k === "j") doAttack(p1, p2, "punch");
        if (k === "k") doAttack(p1, p2, "kick");
      }
      keys[k] = true;
    });
    document.addEventListener("keyup", e => { keys[e.key.toLowerCase()] = false; });

    function jump(f) { if (f.onGround) { f.vy = JUMP; f.onGround = false; } }

    function ring(x, y, color) { effects.push({ kind:"ring", x, y, age:0, max:18, color }); }
    function floatText(x, y, txt, color) { effects.push({ kind:"text", x, y, txt, color, age:0, max:45 }); }

    function doAttack(att, def, type) {
      if (phase !== "fight" || att.cd > 0 || att.state === "block") return;

      if (type === "punch") { att.punchStreak++; att.kickStreak = 0; }
      else { att.kickStreak++; att.punchStreak = 0; }

      const isSuper = (type === "punch" && att.punchStreak >= 5) ||
                      (type === "kick"  && att.kickStreak  >= 5);
      if (isSuper) { att.punchStreak = 0; att.kickStreak = 0; att.superFx = 10; }

      att.state = type;
      att.stateT = (type === "punch" ? 12 : 16) + (isSuper ? 6 : 0);
      att.cd = (type === "punch" ? 18 : 26);

      let reach = type === "punch" ? 95 : 125;
      if (isSuper) reach += 25;
      let dmg = type === "punch" ? 6 : 11;
      if (isSuper) dmg = type === "punch" ? 18 : 26;
      if (att.dmgBuff > 0) dmg *= 1.5;
      if (att.isCPU) dmg *= DIFF[difficulty].dmg;

      const dist = Math.abs(att.x - def.x);
      const inFront = (def.x - att.x) * att.facing > 0;
      if (dist <= reach && inFront) {
        let real = dmg;
        if (def.state === "block") real *= 0.2;
        if (def.shield > 0) real *= 0.3;
        def.hp = Math.max(0, def.hp - real);
        def.x += att.facing * (isSuper ? 32 : 14);
        def.flash = isSuper ? 10 : 6;
        if (isSuper) { ring(def.x, def.y - 60, att.glove); ring(def.x, def.y - 60, "#fff"); }
      }
    }

    function cpuThink() {
      const s = DIFF[difficulty];
      p2.think--;
      const gap = Math.abs(p1.x - p2.x);

      // reactive block on hard/medium
      if (p2.state !== "block") {
        if ((p1.state === "punch" || p1.state === "kick") && gap < 135 && Math.random() < s.react) {
          p2.state = "block"; p2.stateT = 14; return;
        }
      } else if (p2.stateT <= 0) { p2.state = "idle"; }

      // chase a power-up sometimes
      if (powerups.length && Math.random() < s.grab * 0.05) {
        const pu = powerups[0];
        p2.x += Math.sign(pu.x - p2.x) * s.spd; return;
      }

      if (p2.think <= 0) {
        const r = Math.random();
        if (gap > s.gap) { p2.x += p2.facing * s.spd; }
        else if (r < s.atk) { doAttack(p2, p1, Math.random() < 0.5 ? "punch" : "kick"); }
        else if (r < s.atk + s.blk) { p2.state = "block"; p2.stateT = 16; }
        else if (r < s.atk + s.blk + 0.12) { jump(p2); }
        else { p2.x -= p2.facing * s.spd; }
        p2.think = s.think[0] + Math.floor(Math.random() * (s.think[1] - s.think[0]));
      } else if (gap > s.gap) { p2.x += p2.facing * s.spd; }
    }

    function physics(f) {
      f.vy += GRAV; f.y += f.vy;
      if (f.y >= GROUND) { f.y = GROUND; f.vy = 0; f.onGround = true; }
      f.x = Math.max(40, Math.min(W - 40, f.x));
      if (f.cd > 0) f.cd--;
      if (f.stateT > 0) { f.stateT--; if (f.stateT === 0 && f.state !== "block") f.state = "idle"; }
      if (f.flash > 0) f.flash--;
      if (f.superFx > 0) f.superFx--;
      if (f.dmgBuff > 0) f.dmgBuff--;
      if (f.shield > 0) f.shield--;
      if (f.speedBuff > 0) f.speedBuff--;
    }

    const PU_TYPES = [
      { t:"heal",   c:"#2ecc71", s:"+", label:"+HP" },
      { t:"dmg",    c:"#e67e22", s:"!", label:"DMG+" },
      { t:"shield", c:"#3498db", s:"O", label:"SHIELD" },
      { t:"speed",  c:"#f1c40f", s:">", label:"SPEED" }
    ];

    function spawnPowerup() {
      const def = PU_TYPES[Math.floor(Math.random() * PU_TYPES.length)];
      powerups.push({ x: 80 + Math.random() * (W - 160), y: -20, vy: 2.2,
        def, landed:false, life: 360 });
    }

    function applyPU(f, def) {
      if (def.t === "heal") f.hp = Math.min(100, f.hp + 25);
      if (def.t === "dmg") f.dmgBuff = 360;
      if (def.t === "shield") f.shield = 300;
      if (def.t === "speed") f.speedBuff = 360;
      floatText(f.x, f.y - 110, def.label, def.c);
    }

    function updatePowerups() {
      spawnT--;
      if (spawnT <= 0) { spawnPowerup(); spawnT = 360 + Math.floor(Math.random() * 240); }
      for (let i = powerups.length - 1; i >= 0; i--) {
        const pu = powerups[i];
        if (!pu.landed) { pu.y += pu.vy; if (pu.y >= GROUND - 16) { pu.y = GROUND - 16; pu.landed = true; } }
        else { pu.life--; }
        // grab check
        for (const f of [p1, p2]) {
          if (Math.abs(f.x - pu.x) < 38 && (f.y - 110) < pu.y && f.y > pu.y - 30) {
            applyPU(f, pu.def); powerups.splice(i, 1); break;
          }
        }
        if (pu.life !== undefined && pu.life <= 0) powerups.splice(i, 1);
      }
    }

    function update() {
      if (phase !== "fight") return;
      p1.facing = p1.x <= p2.x ? 1 : -1;
      p2.facing = p2.x <= p1.x ? 1 : -1;

      const spd1 = BASESPEED * (p1.speedBuff > 0 ? 1.5 : 1);
      if (keys["l"]) { p1.state = "block"; p1.stateT = 2; }
      else if (p1.state === "block") p1.state = "idle";
      if (!keys["l"] && p1.state === "idle") {
        if (keys["a"]) p1.x -= spd1;
        if (keys["d"]) p1.x += spd1;
      }

      cpuThink();
      physics(p1); physics(p2);
      updatePowerups();

      if (Math.abs(p1.x - p2.x) < FW - 8) {
        const mid = (p1.x + p2.x) / 2;
        if (p1.x < p2.x) { p1.x = mid - (FW-8)/2; p2.x = mid + (FW-8)/2; }
        else { p2.x = mid - (FW-8)/2; p1.x = mid + (FW-8)/2; }
      }

      if (p1.hp <= 0 || p2.hp <= 0) {
        phase = "over";
        banner = p2.hp <= 0 ? "YOU WIN!" : "YOU LOSE";
        bannerColor = p2.hp <= 0 ? "#2ecc71" : "#e74c3c";
        setTimeout(openMenu, 1600);
      }
    }

    function drawFighter(f) {
      const x = f.x, y = f.y, dir = f.facing;
      const airborne = GROUND - y;

      // shadow
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.beginPath();
      ctx.ellipse(x, GROUND + 6, 22 - airborne * 0.06, 6, 0, 0, Math.PI * 2);
      ctx.fill();

      // shield aura
      if (f.shield > 0) {
        ctx.strokeStyle = "rgba(52,152,219,0.8)"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(x, y - 55, 46, 0, Math.PI * 2); ctx.stroke();
      }
      if (f.superFx > 0) {
        ctx.strokeStyle = "rgba(241,196,15," + (f.superFx/10) + ")"; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(x, y - 55, 40 + (10 - f.superFx) * 3, 0, Math.PI * 2); ctx.stroke();
      }

      const body = f.flash > 0 ? "#ffffff" : f.color;
      ctx.lineWidth = 8; ctx.lineCap = "round"; ctx.strokeStyle = body;
      const headY = y - 98;

      // head + headband + eyes
      ctx.fillStyle = body;
      ctx.beginPath(); ctx.arc(x, headY, 14, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = f.flash > 0 ? "#333" : f.band;
      ctx.fillRect(x - 14, headY - 6, 28, 6);
      ctx.fillStyle = "#0d0d0f";
      ctx.beginPath(); ctx.arc(x + dir * 5, headY + 2, 2.2, 0, Math.PI * 2); ctx.fill();

      // torso
      ctx.strokeStyle = body;
      ctx.beginPath(); ctx.moveTo(x, headY + 14); ctx.lineTo(x, y - 46); ctx.stroke();
      // shorts
      ctx.fillStyle = f.shorts; ctx.fillRect(x - 13, y - 52, 26, 17);

      // legs
      if (f.state === "kick") {
        ctx.beginPath(); ctx.moveTo(x, y - 46); ctx.lineTo(x + dir * 50, y - 42); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x, y - 46); ctx.lineTo(x - dir * 12, y); ctx.stroke();
        ctx.fillStyle = "#111"; ctx.fillRect(x + dir * 46 - 5, y - 46, 12, 7); // shoe
      } else {
        ctx.beginPath(); ctx.moveTo(x, y - 46); ctx.lineTo(x - 13, y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x, y - 46); ctx.lineTo(x + 13, y); ctx.stroke();
        ctx.fillStyle = "#111"; ctx.fillRect(x - 19, y - 4, 13, 6); ctx.fillRect(x + 6, y - 4, 13, 6);
      }

      // arms + gloves (guard stance by default)
      const sh = y - 80;
      const gloveCol = f.dmgBuff > 0 ? "#ffae42" : f.glove;
      function arm(hx, hy) {
        ctx.strokeStyle = body;
        ctx.beginPath(); ctx.moveTo(x, sh); ctx.lineTo(hx, hy); ctx.stroke();
        ctx.fillStyle = gloveCol;
        ctx.beginPath(); ctx.arc(hx, hy, 8, 0, Math.PI * 2); ctx.fill();
      }
      if (f.state === "punch") {
        arm(x + dir * 46, y - 78);   // jab out
        arm(x + dir * 8, y - 86);    // guard
      } else if (f.state === "block") {
        arm(x + dir * 10, y - 96);
        arm(x + dir * 12, y - 82);
      } else {
        arm(x + dir * 16, y - 84);   // guard up
        arm(x - dir * 6, y - 80);
      }
    }

    function drawPowerup(pu) {
      ctx.save();
      ctx.fillStyle = pu.def.c;
      ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
      const blink = pu.landed && pu.life < 90 && Math.floor(pu.life / 6) % 2 === 0;
      if (!blink) {
        ctx.fillRect(pu.x - 14, pu.y - 14, 28, 28);
        ctx.strokeRect(pu.x - 14, pu.y - 14, 28, 28);
        ctx.fillStyle = "#fff"; ctx.font = "bold 18px Arial Black";
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(pu.def.s, pu.x, pu.y + 1);
      }
      ctx.restore();
    }

    function drawEffects() {
      for (let i = effects.length - 1; i >= 0; i--) {
        const e = effects[i]; e.age++;
        if (e.kind === "ring") {
          ctx.strokeStyle = e.color; ctx.globalAlpha = 1 - e.age / e.max; ctx.lineWidth = 4;
          ctx.beginPath(); ctx.arc(e.x, e.y, e.age * 4, 0, Math.PI * 2); ctx.stroke();
          ctx.globalAlpha = 1;
        } else if (e.kind === "text") {
          ctx.fillStyle = e.color; ctx.globalAlpha = 1 - e.age / e.max;
          ctx.font = "bold 18px Arial Black"; ctx.textAlign = "center";
          ctx.fillText(e.txt, e.x, e.y - e.age * 0.6); ctx.globalAlpha = 1;
        }
        if (e.age >= e.max) effects.splice(i, 1);
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      // floor
      ctx.fillStyle = "#1a1d24"; ctx.fillRect(0, GROUND, W, H - GROUND);
      ctx.strokeStyle = "#3a3f4a"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(0, GROUND); ctx.lineTo(W, GROUND); ctx.stroke();

      if (p1 && p2) {
        powerups.forEach(drawPowerup);
        drawFighter(p1); drawFighter(p2);
        drawEffects();
        hp1el.style.width = p1.hp + "%";
        hp2el.style.width = p2.hp + "%";
        pcEl.textContent = p1.punchStreak;
        kcEl.textContent = p1.kickStreak;
      }

      if (banner) {
        ctx.fillStyle = bannerColor; ctx.font = "bold 52px Arial Black, Arial";
        ctx.textAlign = "center"; ctx.fillText(banner, W / 2, H / 2);
      }
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    loop();
  </script>
</body>
</html>
