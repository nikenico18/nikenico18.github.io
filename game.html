<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cage Fight - MMA Fighter</title>
  <style>
    body {
      margin: 0; background: #0d0d0f; color: #fff;
      font-family: 'Arial Black', Arial, sans-serif;
      text-align: center; padding: 20px 10px 40px;
    }
    h1 { letter-spacing: 3px; color: #e74c3c;
      text-shadow: 0 0 12px rgba(231,76,60,.7); margin: 10px 0; }
    .bars { width: 760px; max-width: 100%; margin: 0 auto 10px; display: flex; gap: 20px; }
    .bar-wrap { flex: 1; }
    .bar-label { text-align: left; font-size: 14px; margin-bottom: 4px; }
    .bar-label.right { text-align: right; }
    .bar-bg { background: #333; border: 2px solid #000; height: 24px; border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; width: 100%; transition: width .12s linear; }
    .p1 { background: linear-gradient(180deg,#5dade2,#2e86c1); }
    .p2 { background: linear-gradient(180deg,#ec7063,#c0392b); margin-left:auto; }
    canvas { background:#11141a; border:4px solid #444; border-radius:8px; max-width:100%; height:auto; }
    #controls { margin-top: 18px; color: #bbb; font-size: 14px; font-family: Arial, sans-serif; }
    #controls b { color: #fff; }
    button { margin-top: 16px; font-size: 18px; padding: 10px 24px; background: #c0392b;
      color: #fff; border: none; border-radius: 6px; cursor: pointer; font-family: 'Arial Black', sans-serif; }
    button:hover { background: #e74c3c; }
    a { color: #5dade2; font-family: Arial, sans-serif; }
  </style>
</head>
<body>

  <h1>CAGE FIGHT</h1>

  <div class="bars">
    <div class="bar-wrap"><div class="bar-label">YOU</div>
      <div class="bar-bg"><div class="bar-fill p1" id="hp1"></div></div></div>
    <div class="bar-wrap"><div class="bar-label right">CPU</div>
      <div class="bar-bg"><div class="bar-fill p2" id="hp2"></div></div></div>
  </div>

  <canvas id="game" width="760" height="340"></canvas>

  <div id="controls">
    <b>A</b> / <b>D</b> move &nbsp;|&nbsp; <b>SPACE</b> jump &nbsp;|&nbsp;
    <b>J</b> punch &nbsp;|&nbsp; <b>K</b> kick &nbsp;|&nbsp; hold <b>L</b> block
  </div>

  <div><button onclick="startRound()">Rematch</button></div>
  <p><a href="scratch.html">&larr; Back to MMA page</a></p>

  <script>
    const cv = document.getElementById("game");
    const ctx = cv.getContext("2d");
    const W = 760, H = 340, GROUND = 300;
    const GRAV = 0.8, JUMP = -14, SPEED = 3.6, FW = 60;
    const hp1el = document.getElementById("hp1");
    const hp2el = document.getElementById("hp2");

    let p1, p2, keys, over, started, banner, bannerColor;

    function makeFighter(x, facing, isCPU, color, glove, shorts) {
      return { x, y: GROUND, vy: 0, onGround: true, hp: 100, facing,
        state: "idle", stateT: 0, cd: 0, isCPU, color, glove, shorts, think: 0 };
    }

    function startRound() {
      p1 = makeFighter(180, 1, false, "#5dade2", "#2e86c1", "#1b4f72");
      p2 = makeFighter(540, -1, true, "#ec7063", "#c0392b", "#7b241c");
      keys = {}; over = false; started = false;
      banner = "FIGHT!"; bannerColor = "#f1c40f";
      setTimeout(() => { started = true; banner = ""; }, 900);
    }

    document.addEventListener("keydown", e => {
      const k = e.key.toLowerCase();
      if (["a","d","j","k","l"," "].includes(k)) e.preventDefault();
      // edge-triggered actions
      if (!keys[k]) {
        if (k === " ") jump(p1);
        if (k === "j") doAttack(p1, p2, "punch");
        if (k === "k") doAttack(p1, p2, "kick");
      }
      keys[k] = true;
    });
    document.addEventListener("keyup", e => { keys[e.key.toLowerCase()] = false; });

    function jump(f) { if (f.onGround && !over && started) { f.vy = JUMP; f.onGround = false; } }

    function doAttack(att, def, type) {
      if (over || !started || att.cd > 0 || att.state === "block") return;
      att.state = type;
      att.stateT = type === "punch" ? 12 : 16;
      att.cd = type === "punch" ? 18 : 26;
      const reach = type === "punch" ? 95 : 125;
      const dmg = type === "punch" ? 6 : 11;
      const dist = Math.abs(att.x - def.x);
      const inFront = (def.x - att.x) * att.facing > 0;
      if (dist <= reach && inFront) {
        const real = def.state === "block" ? dmg * 0.2 : dmg;
        def.hp = Math.max(0, def.hp - real);
        def.x += att.facing * 14; // knockback
        def.flash = 6;
      }
    }

    function cpuThink() {
      if (over || !started) return;
      p2.think--;
      const gap = Math.abs(p1.x - p2.x);
      if (p2.state === "block") p2.state = "idle";
      if (p2.think <= 0) {
        const r = Math.random();
        if (gap > 150) { p2.x += p2.facing * SPEED; }
        else if (r < 0.4) { doAttack(p2, p1, Math.random() < 0.5 ? "punch" : "kick"); }
        else if (r < 0.6) { p2.state = "block"; p2.stateT = 18; }
        else if (r < 0.72) { jump(p2); }
        else { p2.x -= p2.facing * SPEED; }
        p2.think = 12 + Math.floor(Math.random() * 16);
      } else if (gap > 150) { p2.x += p2.facing * SPEED; }
    }

    function physics(f) {
      f.vy += GRAV; f.y += f.vy;
      if (f.y >= GROUND) { f.y = GROUND; f.vy = 0; f.onGround = true; }
      f.x = Math.max(40, Math.min(W - 40, f.x));
      if (f.cd > 0) f.cd--;
      if (f.stateT > 0) { f.stateT--; if (f.stateT === 0 && f.state !== "block") f.state = "idle"; }
      if (f.flash > 0) f.flash--;
    }

    function update() {
      if (over || !started) return;
      p1.facing = p1.x <= p2.x ? 1 : -1;
      p2.facing = p2.x <= p1.x ? 1 : -1;

      // player movement + block
      if (keys["l"]) { p1.state = "block"; p1.stateT = 2; }
      else if (p1.state === "block") p1.state = "idle";
      if (!keys["l"] && p1.state === "idle") {
        if (keys["a"]) p1.x -= SPEED;
        if (keys["d"]) p1.x += SPEED;
      }

      cpuThink();
      physics(p1); physics(p2);

      // keep them from overlapping
      if (Math.abs(p1.x - p2.x) < FW - 8) {
        const mid = (p1.x + p2.x) / 2;
        if (p1.x < p2.x) { p1.x = mid - (FW-8)/2; p2.x = mid + (FW-8)/2; }
        else { p2.x = mid - (FW-8)/2; p1.x = mid + (FW-8)/2; }
      }

      if (p1.hp <= 0 || p2.hp <= 0) {
        over = true;
        banner = p2.hp <= 0 ? "YOU WIN!" : "YOU LOSE";
        bannerColor = p2.hp <= 0 ? "#2ecc71" : "#e74c3c";
      }
    }

    function drawFighter(f) {
      const x = f.x, y = f.y, dir = f.facing;
      ctx.save();
      ctx.lineWidth = 7;
      ctx.lineCap = "round";
      ctx.strokeStyle = f.flash > 0 ? "#ffffff" : f.color;

      const headY = y - 96;
      // head
      ctx.fillStyle = f.flash > 0 ? "#ffffff" : f.color;
      ctx.beginPath(); ctx.arc(x, headY, 13, 0, Math.PI * 2); ctx.fill();
      // torso
      ctx.beginPath(); ctx.moveTo(x, headY + 13); ctx.lineTo(x, y - 45); ctx.stroke();
      // shorts
      ctx.fillStyle = f.shorts;
      ctx.fillRect(x - 12, y - 50, 24, 16);

      // legs
      ctx.strokeStyle = f.flash > 0 ? "#ffffff" : f.color;
      if (f.state === "kick") {
        ctx.beginPath(); ctx.moveTo(x, y - 45); ctx.lineTo(x + dir * 46, y - 40); ctx.stroke(); // kicking leg
        ctx.beginPath(); ctx.moveTo(x, y - 45); ctx.lineTo(x - dir * 10, y); ctx.stroke();
      } else {
        ctx.beginPath(); ctx.moveTo(x, y - 45); ctx.lineTo(x - 12, y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x, y - 45); ctx.lineTo(x + 12, y); ctx.stroke();
      }

      // arms + gloves
      const sh = y - 78;
      ctx.fillStyle = f.glove;
      if (f.state === "punch") {
        ctx.beginPath(); ctx.moveTo(x, sh); ctx.lineTo(x + dir * 40, y - 74); ctx.stroke();
        ctx.beginPath(); ctx.arc(x + dir * 40, y - 74, 7, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(x, sh); ctx.lineTo(x - dir * 10, y - 60); ctx.stroke();
        ctx.beginPath(); ctx.arc(x - dir * 10, y - 60, 7, 0, Math.PI*2); ctx.fill();
      } else if (f.state === "block") {
        ctx.beginPath(); ctx.moveTo(x, sh); ctx.lineTo(x + dir * 12, y - 92); ctx.stroke();
        ctx.beginPath(); ctx.arc(x + dir * 12, y - 92, 7, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(x, sh); ctx.lineTo(x + dir * 14, y - 78); ctx.stroke();
        ctx.beginPath(); ctx.arc(x + dir * 14, y - 78, 7, 0, Math.PI*2); ctx.fill();
      } else {
        ctx.beginPath(); ctx.moveTo(x, sh); ctx.lineTo(x + dir * 14, y - 58); ctx.stroke();
        ctx.beginPath(); ctx.arc(x + dir * 14, y - 58, 7, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(x, sh); ctx.lineTo(x - dir * 12, y - 58); ctx.stroke();
        ctx.beginPath(); ctx.arc(x - dir * 12, y - 58, 7, 0, Math.PI*2); ctx.fill();
      }
      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      // floor
      ctx.fillStyle = "#1a1d24";
      ctx.fillRect(0, GROUND, W, H - GROUND);
      ctx.strokeStyle = "#3a3f4a"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(0, GROUND); ctx.lineTo(W, GROUND); ctx.stroke();

      drawFighter(p1); drawFighter(p2);
      hp1el.style.width = p1.hp + "%";
      hp2el.style.width = p2.hp + "%";

      if (banner) {
        ctx.fillStyle = bannerColor;
        ctx.font = "bold 52px Arial Black, Arial";
        ctx.textAlign = "center";
        ctx.fillText(banner, W / 2, H / 2);
      }
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }

    startRound();
    loop();
  </script>
</body>
</html>
